<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <rect width="600" height="400" rx="12" fill="#f2f4f6"/>

  <!-- Cloud shape -->
  <path d="M200 220 C200 180 230 150 270 150 C280 120 320 100 360 110 C400 95 450 120 460 160 C490 160 510 185 510 210 C510 240 490 260 460 260 L200 260 C170 260 150 240 150 220 C150 195 175 180 200 180" fill="white" stroke="#0b1f3b" stroke-width="1.5" opacity="0.8"/>

  <!-- Inner cloud elements -->
  <rect x="230" y="190" width="50" height="40" rx="6" fill="#0b1f3b" opacity="0.06"/>
  <rect x="295" y="180" width="50" height="50" rx="6" fill="#2a6bc4" opacity="0.08"/>
  <rect x="360" y="190" width="50" height="40" rx="6" fill="#0b1f3b" opacity="0.06"/>

  <!-- Server rack below -->
  <g transform="translate(220, 290)">
    <rect width="160" height="80" rx="8" fill="white" stroke="#0b1f3b" stroke-width="1" opacity="0.3"/>
    <rect x="12" y="12" width="136" height="16" rx="3" fill="#0b1f3b" opacity="0.06"/>
    <circle cx="28" cy="20" r="3" fill="#22c55e" opacity="0.8"/>
    <circle cx="40" cy="20" r="3" fill="#22c55e" opacity="0.8"/>
    <rect x="12" y="36" width="136" height="16" rx="3" fill="#0b1f3b" opacity="0.06"/>
    <circle cx="28" cy="44" r="3" fill="#2a6bc4" opacity="0.8"/>
    <circle cx="40" cy="44" r="3" fill="#22c55e" opacity="0.8"/>
    <rect x="12" y="58" width="136" height="16" rx="3" fill="#0b1f3b" opacity="0.06"/>
    <circle cx="28" cy="66" r="3" fill="#22c55e" opacity="0.8"/>
    <circle cx="40" cy="66" r="3" fill="#22c55e" opacity="0.8"/>
  </g>

  <!-- Upload arrows -->
  <path d="M300 285 L300 265" stroke="#2a6bc4" stroke-width="2" stroke-dasharray="4 3" opacity="0.4"/>
  <path d="M260 285 L260 270" stroke="#0b1f3b" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.3"/>
  <path d="M340 285 L340 270" stroke="#0b1f3b" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.3"/>

  <!-- Stats cards -->
  <g transform="translate(60, 60)">
    <rect width="120" height="50" rx="10" fill="white" filter="url(#itShadow)"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="9" fill="#3a5069" font-weight="600">UPTIME</text>
    <text x="14" y="40" font-family="Manrope, sans-serif" font-size="18" fill="#0b1f3b" font-weight="800">99.9%</text>
  </g>
  <g transform="translate(420, 60)">
    <rect width="130" height="50" rx="10" fill="white" filter="url(#itShadow)"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="9" fill="#3a5069" font-weight="600">MIGRATION</text>
    <text x="14" y="40" font-family="Manrope, sans-serif" font-size="18" fill="#0b1f3b" font-weight="800">Cloud-Ready</text>
  </g>

  <defs>
    <filter id="itShadow" x="-10%" y="-10%" width="130%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#071b37" flood-opacity="0.06"/>
    </filter>
  </defs>
</svg>