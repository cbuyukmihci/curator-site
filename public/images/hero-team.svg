<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" rx="16" fill="#eceef0"/>

  <!-- Office building silhouette -->
  <rect x="200" y="150" width="400" height="350" rx="8" fill="#0b1f3b" opacity="0.04"/>
  <rect x="220" y="170" width="360" height="330" rx="4" fill="white" opacity="0.6"/>

  <!-- Window grid -->
  <g opacity="0.12" fill="#0b1f3b">
    <rect x="250" y="200" width="60" height="40" rx="4"/><rect x="330" y="200" width="60" height="40" rx="4"/>
    <rect x="410" y="200" width="60" height="40" rx="4"/><rect x="490" y="200" width="60" height="40" rx="4"/>
    <rect x="250" y="260" width="60" height="40" rx="4"/><rect x="330" y="260" width="60" height="40" rx="4"/>
    <rect x="410" y="260" width="60" height="40" rx="4"/><rect x="490" y="260" width="60" height="40" rx="4"/>
    <rect x="250" y="320" width="60" height="40" rx="4"/><rect x="330" y="320" width="60" height="40" rx="4"/>
    <rect x="410" y="320" width="60" height="40" rx="4"/><rect x="490" y="320" width="60" height="40" rx="4"/>
  </g>

  <!-- Lit windows -->
  <rect x="330" y="200" width="60" height="40" rx="4" fill="#2a6bc4" opacity="0.15"/>
  <rect x="490" y="260" width="60" height="40" rx="4" fill="#2a6bc4" opacity="0.15"/>
  <rect x="250" y="320" width="60" height="40" rx="4" fill="#2a6bc4" opacity="0.15"/>

  <!-- People silhouettes -->
  <g transform="translate(260, 390)">
    <circle cx="30" cy="10" r="18" fill="#0b1f3b" opacity="0.7"/>
    <path d="M0 80 C0 50 15 35 30 35 C45 35 60 50 60 80 L60 110 L0 110 Z" fill="#0b1f3b" opacity="0.6"/>
  </g>
  <g transform="translate(350, 380)">
    <circle cx="35" cy="15" r="22" fill="#0b1f3b" opacity="0.8"/>
    <path d="M0 90 C0 55 17 38 35 38 C53 38 70 55 70 90 L70 120 L0 120 Z" fill="#0b1f3b" opacity="0.7"/>
  </g>
  <g transform="translate(470, 395)">
    <circle cx="28" cy="8" r="17" fill="#0b1f3b" opacity="0.65"/>
    <path d="M0 75 C0 48 13 33 28 33 C43 33 56 48 56 75 L56 105 L0 105 Z" fill="#0b1f3b" opacity="0.55"/>
  </g>

  <!-- Floating stats -->
  <g transform="translate(80, 80)">
    <rect width="130" height="60" rx="12" fill="white" filter="url(#heroShadow)"/>
    <text x="16" y="24" font-family="Inter, sans-serif" font-size="9" fill="#3a5069" font-weight="600">TEAM</text>
    <text x="16" y="48" font-family="Manrope, sans-serif" font-size="22" fill="#0b1f3b" font-weight="800">50+ Experts</text>
  </g>

  <g transform="translate(560, 100)">
    <rect width="160" height="60" rx="12" fill="white" filter="url(#heroShadow)"/>
    <text x="16" y="24" font-family="Inter, sans-serif" font-size="9" fill="#3a5069" font-weight="600">SECTORS</text>
    <text x="16" y="48" font-family="Manrope, sans-serif" font-size="22" fill="#0b1f3b" font-weight="800">4 Industries</text>
  </g>

  <g transform="translate(600, 350)">
    <rect width="140" height="60" rx="12" fill="white" filter="url(#heroShadow)"/>
    <text x="16" y="24" font-family="Inter, sans-serif" font-size="9" fill="#3a5069" font-weight="600">PRESENCE</text>
    <text x="16" y="48" font-family="Manrope, sans-serif" font-size="22" fill="#0b1f3b" font-weight="800">2 Offices</text>
  </g>

  <defs>
    <filter id="heroShadow" x="-10%" y="-10%" width="130%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#071b37" flood-opacity="0.06"/>
    </filter>
  </defs>
</svg>