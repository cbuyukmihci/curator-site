<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <rect width="600" height="400" rx="12" fill="#f2f4f6"/>

  <!-- Shield shape -->
  <path d="M300 60 L420 120 L420 240 C420 310 300 370 300 370 C300 370 180 310 180 240 L180 120 Z" fill="#0b1f3b" opacity="0.04" stroke="#0b1f3b" stroke-width="1.5" opacity="0.1"/>
  <path d="M300 90 L395 140 L395 235 C395 295 300 345 300 345 C300 345 205 295 205 235 L205 140 Z" fill="white" stroke="#0b1f3b" stroke-width="1" opacity="0.08"/>

  <!-- Checkmark in shield -->
  <circle cx="300" cy="200" r="40" fill="#0b1f3b" opacity="0.06"/>
  <path d="M278 200 L293 215 L322 186" stroke="#0b1f3b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Compliance items -->
  <g transform="translate(50, 80)">
    <rect width="120" height="55" rx="10" fill="white" filter="url(#cShadow)"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="9" fill="#3a5069" font-weight="600" letter-spacing="0.5">STANDARD</text>
    <text x="14" y="42" font-family="Manrope, sans-serif" font-size="16" fill="#0b1f3b" font-weight="800">ISO 27001</text>
  </g>
  <g transform="translate(430, 80)">
    <rect width="120" height="55" rx="10" fill="white" filter="url(#cShadow)"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="9" fill="#3a5069" font-weight="600" letter-spacing="0.5">REGULATION</text>
    <text x="14" y="42" font-family="Manrope, sans-serif" font-size="16" fill="#0b1f3b" font-weight="800">KVKK</text>
  </g>
  <g transform="translate(50, 280)">
    <rect width="120" height="55" rx="10" fill="white" filter="url(#cShadow)"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="9" fill="#3a5069" font-weight="600" letter-spacing="0.5">FRAMEWORK</text>
    <text x="14" y="42" font-family="Manrope, sans-serif" font-size="16" fill="#0b1f3b" font-weight="800">GDPR</text>
  </g>
  <g transform="translate(430, 280)">
    <rect width="120" height="55" rx="10" fill="white" filter="url(#cShadow)"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="9" fill="#3a5069" font-weight="600" letter-spacing="0.5">AUDIT</text>
    <text x="14" y="42" font-family="Manrope, sans-serif" font-size="16" fill="#0b1f3b" font-weight="800">Internal</text>
  </g>

  <!-- Connecting dotted lines -->
  <line x1="170" y1="107" x2="260" y2="180" stroke="#0b1f3b" stroke-width="1" stroke-dasharray="4 4" opacity="0.15"/>
  <line x1="430" y1="107" x2="340" y2="180" stroke="#0b1f3b" stroke-width="1" stroke-dasharray="4 4" opacity="0.15"/>
  <line x1="170" y1="307" x2="260" y2="220" stroke="#0b1f3b" stroke-width="1" stroke-dasharray="4 4" opacity="0.15"/>
  <line x1="430" y1="307" x2="340" y2="220" stroke="#0b1f3b" stroke-width="1" stroke-dasharray="4 4" opacity="0.15"/>

  <defs>
    <filter id="cShadow" x="-10%" y="-10%" width="130%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#071b37" flood-opacity="0.06"/>
    </filter>
  </defs>
</svg>