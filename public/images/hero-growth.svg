<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background -->
  <rect width="800" height="600" rx="16" fill="#f2f4f6"/>

  <!-- Grid lines -->
  <g opacity="0.1" stroke="#0b1f3b">
    <line x1="100" y1="100" x2="100" y2="500" stroke-width="1"/>
    <line x1="200" y1="100" x2="200" y2="500" stroke-width="1"/>
    <line x1="300" y1="100" x2="300" y2="500" stroke-width="1"/>
    <line x1="400" y1="100" x2="400" y2="500" stroke-width="1"/>
    <line x1="500" y1="100" x2="500" y2="500" stroke-width="1"/>
    <line x1="600" y1="100" x2="600" y2="500" stroke-width="1"/>
    <line x1="700" y1="100" x2="700" y2="500" stroke-width="1"/>
    <line x1="100" y1="150" x2="700" y2="150" stroke-width="1"/>
    <line x1="100" y1="225" x2="700" y2="225" stroke-width="1"/>
    <line x1="100" y1="300" x2="700" y2="300" stroke-width="1"/>
    <line x1="100" y1="375" x2="700" y2="375" stroke-width="1"/>
    <line x1="100" y1="450" x2="700" y2="450" stroke-width="1"/>
  </g>

  <!-- Growth chart area fill -->
  <path d="M150 420 L250 380 L350 340 L450 280 L550 200 L650 140 L650 500 L150 500 Z" fill="url(#chartGrad)" opacity="0.15"/>

  <!-- Growth line -->
  <path d="M150 420 L250 380 L350 340 L450 280 L550 200 L650 140" stroke="#0b1f3b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Data points -->
  <circle cx="150" cy="420" r="6" fill="#0b1f3b"/>
  <circle cx="250" cy="380" r="6" fill="#0b1f3b"/>
  <circle cx="350" cy="340" r="6" fill="#0b1f3b"/>
  <circle cx="450" cy="280" r="8" fill="#2a6bc4"/>
  <circle cx="550" cy="200" r="6" fill="#0b1f3b"/>
  <circle cx="650" cy="140" r="8" fill="#2a6bc4"/>

  <!-- Milestone marker -->
  <line x1="450" y1="280" x2="450" y2="500" stroke="#2a6bc4" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <rect x="420" y="490" width="60" height="20" rx="4" fill="#2a6bc4" opacity="0.1"/>
  <text x="450" y="504" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#2a6bc4" font-weight="600">NOW</text>

  <!-- Bar chart overlay -->
  <rect x="160" y="360" width="30" height="140" rx="4" fill="#0b1f3b" opacity="0.08"/>
  <rect x="260" y="330" width="30" height="170" rx="4" fill="#0b1f3b" opacity="0.08"/>
  <rect x="360" y="290" width="30" height="210" rx="4" fill="#0b1f3b" opacity="0.08"/>
  <rect x="460" y="240" width="30" height="260" rx="4" fill="#2a6bc4" opacity="0.12"/>
  <rect x="560" y="180" width="30" height="320" rx="4" fill="#0b1f3b" opacity="0.08"/>
  <rect x="660" y="130" width="30" height="370" rx="4" fill="#2a6bc4" opacity="0.12"/>

  <!-- Floating card 1 -->
  <g transform="translate(80, 80)">
    <rect width="140" height="70" rx="12" fill="white" filter="url(#shadow)"/>
    <text x="16" y="28" font-family="Inter, sans-serif" font-size="10" fill="#3a5069" font-weight="600" text-transform="uppercase" letter-spacing="1">GROWTH RATE</text>
    <text x="16" y="52" font-family="Manrope, sans-serif" font-size="24" fill="#0b1f3b" font-weight="800">+47%</text>
    <circle cx="120" cy="40" r="14" fill="#2a6bc4" opacity="0.1"/>
    <path d="M114 43 L120 37 L126 43" stroke="#2a6bc4" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Floating card 2 -->
  <g transform="translate(560, 60)">
    <rect width="160" height="70" rx="12" fill="white" filter="url(#shadow)"/>
    <text x="16" y="28" font-family="Inter, sans-serif" font-size="10" fill="#3a5069" font-weight="600" letter-spacing="1">COMPLIANCE</text>
    <text x="16" y="52" font-family="Manrope, sans-serif" font-size="24" fill="#0b1f3b" font-weight="800">ISO 27001</text>
    <circle cx="140" cy="40" r="14" fill="#0b1f3b" opacity="0.1"/>
    <path d="M134 40 L138 44 L146 36" stroke="#0b1f3b" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>

  <defs>
    <linearGradient id="chartGrad" x1="400" y1="140" x2="400" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1f3b"/>
      <stop offset="1" stop-color="#0b1f3b" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#071b37" flood-opacity="0.06"/>
    </filter>
  </defs>
</svg>