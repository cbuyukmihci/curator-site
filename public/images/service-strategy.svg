<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <rect width="600" height="400" rx="12" fill="#f2f4f6"/>

  <!-- Target/Radar circles -->
  <circle cx="300" cy="200" r="150" stroke="#0b1f3b" stroke-width="1" opacity="0.06"/>
  <circle cx="300" cy="200" r="110" stroke="#0b1f3b" stroke-width="1" opacity="0.08"/>
  <circle cx="300" cy="200" r="70" stroke="#0b1f3b" stroke-width="1" opacity="0.1"/>
  <circle cx="300" cy="200" r="30" fill="#0b1f3b" opacity="0.08"/>

  <!-- Cross lines -->
  <line x1="150" y1="200" x2="450" y2="200" stroke="#0b1f3b" stroke-width="1" opacity="0.06"/>
  <line x1="300" y1="50" x2="300" y2="350" stroke="#0b1f3b" stroke-width="1" opacity="0.06"/>

  <!-- Data points on radar -->
  <circle cx="380" cy="130" r="8" fill="#2a6bc4" opacity="0.7"/>
  <circle cx="420" cy="200" r="6" fill="#0b1f3b" opacity="0.5"/>
  <circle cx="370" cy="280" r="7" fill="#2a6bc4" opacity="0.6"/>
  <circle cx="220" cy="290" r="5" fill="#0b1f3b" opacity="0.4"/>
  <circle cx="190" cy="160" r="9" fill="#2a6bc4" opacity="0.8"/>
  <circle cx="300" cy="110" r="6" fill="#0b1f3b" opacity="0.5"/>

  <!-- Connection lines -->
  <path d="M380 130 L420 200 L370 280 L220 290 L190 160 L300 110 Z" stroke="#0b1f3b" stroke-width="1.5" opacity="0.15" fill="#2a6bc4" fill-opacity="0.05"/>

  <!-- Label cards -->
  <g transform="translate(60, 50)">
    <rect width="120" height="40" rx="8" fill="white" filter="url(#cardShadow)"/>
    <text x="14" y="25" font-family="Inter, sans-serif" font-size="11" fill="#0b1f3b" font-weight="600">Market Entry</text>
  </g>
  <g transform="translate(420, 50)">
    <rect width="130" height="40" rx="8" fill="white" filter="url(#cardShadow)"/>
    <text x="14" y="25" font-family="Inter, sans-serif" font-size="11" fill="#0b1f3b" font-weight="600">Growth Plan</text>
  </g>
  <g transform="translate(440, 290)">
    <rect width="120" height="40" rx="8" fill="white" filter="url(#cardShadow)"/>
    <text x="14" y="25" font-family="Inter, sans-serif" font-size="11" fill="#0b1f3b" font-weight="600">Compliance</text>
  </g>
  <g transform="translate(40, 280)">
    <rect width="140" height="40" rx="8" fill="white" filter="url(#cardShadow)"/>
    <text x="14" y="25" font-family="Inter, sans-serif" font-size="11" fill="#0b1f3b" font-weight="600">Audit Readiness</text>
  </g>

  <!-- Center icon -->
  <circle cx="300" cy="200" r="20" fill="#0b1f3b"/>
  <path d="M292 200 L296 204 L308 196" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>

  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#071b37" flood-opacity="0.06"/>
    </filter>
  </defs>
</svg>