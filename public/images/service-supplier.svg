<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <rect width="600" height="400" rx="12" fill="#f2f4f6"/>

  <!-- Supply chain nodes -->
  <g opacity="0.9">
    <!-- Node 1 -->
    <circle cx="120" cy="200" r="35" fill="white" stroke="#0b1f3b" stroke-width="2" opacity="0.8"/>
    <rect x="106" y="188" width="28" height="24" rx="4" fill="#0b1f3b" opacity="0.15"/>
    <path d="M112 196 L116 200 L128 192" stroke="#0b1f3b" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- Node 2 -->
    <circle cx="300" cy="120" r="40" fill="white" stroke="#2a6bc4" stroke-width="2"/>
    <rect x="282" y="106" width="36" height="28" rx="4" fill="#2a6bc4" opacity="0.15"/>
    <path d="M293 118 L300 112 L307 118 M300 112 L300 128" stroke="#2a6bc4" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- Node 3 (main/hub) -->
    <circle cx="300" cy="260" r="50" fill="#0b1f3b"/>
    <text x="300" y="254" text-anchor="middle" font-family="Manrope, sans-serif" font-size="12" fill="white" font-weight="700">CURATOR</text>
    <text x="300" y="272" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="white" opacity="0.7">HUB</text>

    <!-- Node 4 -->
    <circle cx="480" cy="200" r="35" fill="white" stroke="#0b1f3b" stroke-width="2" opacity="0.8"/>
    <rect x="466" y="188" width="28" height="24" rx="4" fill="#0b1f3b" opacity="0.15"/>
    <path d="M472 196 L476 200 L488 192" stroke="#0b1f3b" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- Node 5 -->
    <circle cx="480" cy="320" r="30" fill="white" stroke="#0b1f3b" stroke-width="1.5" opacity="0.7"/>
    <rect x="468" y="310" width="24" height="20" rx="3" fill="#0b1f3b" opacity="0.1"/>

    <!-- Node 6 -->
    <circle cx="120" cy="320" r="30" fill="white" stroke="#0b1f3b" stroke-width="1.5" opacity="0.7"/>
    <rect x="108" y="310" width="24" height="20" rx="3" fill="#0b1f3b" opacity="0.1"/>
  </g>

  <!-- Connections -->
  <g stroke="#0b1f3b" stroke-width="1.5" opacity="0.2">
    <line x1="155" y1="200" x2="250" y2="245"/>
    <line x1="300" y1="160" x2="300" y2="210"/>
    <line x1="445" y1="200" x2="350" y2="245"/>
    <line x1="460" y1="300" x2="350" y2="275"/>
    <line x1="140" y1="300" x2="250" y2="275"/>
  </g>

  <!-- Animated pulse rings -->
  <circle cx="300" cy="260" r="60" stroke="#2a6bc4" stroke-width="1" opacity="0.15" fill="none"/>
  <circle cx="300" cy="260" r="75" stroke="#2a6bc4" stroke-width="1" opacity="0.08" fill="none"/>

  <!-- Labels -->
  <text x="120" y="155" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#3a5069" font-weight="600">Supplier A</text>
  <text x="300" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#3a5069" font-weight="600">OEM</text>
  <text x="480" y="155" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#3a5069" font-weight="600">Supplier B</text>
  <text x="480" y="365" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#3a5069" font-weight="600">Tier 2</text>
  <text x="120" y="365" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#3a5069" font-weight="600">Tier 2</text>

  <!-- Status badges -->
  <g transform="translate(68, 62)">
    <rect width="100" height="30" rx="6" fill="white" filter="url(#bShadow)"/>
    <circle cx="18" cy="15" r="4" fill="#22c55e"/>
    <text x="30" y="19" font-family="Inter, sans-serif" font-size="10" fill="#0b1f3b" font-weight="600">Audit Ready</text>
  </g>
  <g transform="translate(430, 62)">
    <rect width="110" height="30" rx="6" fill="white" filter="url(#bShadow)"/>
    <circle cx="18" cy="15" r="4" fill="#f59e0b"/>
    <text x="30" y="19" font-family="Inter, sans-serif" font-size="10" fill="#0b1f3b" font-weight="600">In Progress</text>
  </g>

  <defs>
    <filter id="bShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#071b37" flood-opacity="0.06"/>
    </filter>
  </defs>
</svg>